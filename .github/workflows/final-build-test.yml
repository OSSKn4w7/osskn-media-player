name: Final Build Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: "34.0.0"

    - name: Show project structure
      run: |
        pwd
        ls -la
        find . -name "build.gradle" -type f

    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Set execute permissions for gradlew (if exists)
      run: |
        if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi

    - name: Validate Gradle project
      run: |
        gradle -p . help --console=plain

    - name: List available tasks
      run: |
        gradle -p . tasks --console=plain

    - name: Build Debug APK with verbose logging
      run: |
        gradle -p . assembleDebug --info --console=plain --stacktrace
      env:
        TERM: dumb