name: Minimal Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: "34.0.0"

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate dummy keystore
      run: |
        keytool -genkey -v -keystore osskn4w7.keystore -alias osskn4w7 -keyalg RSA -keysize 2048 -validity 10000 -storepass osskn4w7 -keypass osskn4w7 -dname "CN=osskn4w7, OU=Development, O=osskn4w7, L=, ST=, C=US"

    - name: Check Gradle wrapper
      run: |
        ./gradlew --version

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace